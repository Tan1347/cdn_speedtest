name: Weekly Build Check

on:
  schedule:
    - cron: '0 16 * * 2'  # 每周二 UTC 16:00 = 北京时间 周三 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if build needed
        id: check
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Current HEAD: $HEAD_SHA"

          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing release found, build needed"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_SHA=$(git rev-parse "$LATEST_TAG^{}" 2>/dev/null || git rev-parse "$LATEST_TAG")
          echo "Latest release tag: $LATEST_TAG ($TAG_SHA)"

          if [ "$HEAD_SHA" = "$TAG_SHA" ]; then
            echo "Latest commit already released, skipping build"
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found, build needed"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release tag exists
        if: steps.check.outputs.need_build == 'true'
        id: tag
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION_NAME}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        run: chmod +x ./gradlew

      - name: Build Release APK
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Generate release notes
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        id: notes
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -n "$LATEST_TAG" ]; then
            RANGE="${LATEST_TAG}..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%h %s" --no-merges -10 | while IFS= read -r line; do
            # 限制每行200字符
            if [ ${#line} -gt 200 ]; then
              line="${line:0:197}..."
            fi
            echo "- $line"
          done)

          # 写入多行输出
          {
            echo "body<<EOF"
            echo "## 更新内容"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- 无提交记录"
            fi
            echo ""
            echo "---"
            echo "**版本**: v${{ steps.tag.outputs.version_name }}"
            echo "**构建**: ${{ steps.tag.outputs.tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v${{ steps.tag.outputs.version_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false

      - name: Upload APK artifact
        if: steps.check.outputs.need_build == 'true' && steps.tag.outputs.tag_exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.tag.outputs.tag }}
          path: app/build/outputs/apk/release/*.apk
